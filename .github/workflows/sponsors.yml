name: sponsors

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sponsors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - run: go build -o sponsors .
      - run: ./sponsors generate --config gh://goreleaser/.github/sponsors.yml sponsors.json
        env:
          GITHUB_TOKEN: ${{ secrets.SPONSORS_TOKEN }}
      - run: ./sponsors apply sponsors.json gh://goreleaser/.github/sponsors.tpl.md README.md
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update sponsors"
          file_pattern: "README.md"
